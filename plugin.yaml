name: hermes-quota-status
version: "2.0.0"
description: >-
  Supports Claude, Codex, Gemini, GLM/Zhipu, and DeepSeek quota usage in the
  Hermes status bar. Provider filtering is configured with the Hermes config
  key quota_status.providers. Valid case-sensitive values for
  quota_status.providers are claude, codex, gemini, glm, and deepseek.
author: "Hermes Agent"
provides_hooks:
  - on_status_bar_render
